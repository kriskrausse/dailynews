name: Update Daily Brief

on:
  schedule:
    - cron: '30 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Generate brief.json from live search
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: npm run generate:brief

      - name: Commit updated brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add brief.json package-lock.json
          git diff --cached --quiet || git commit -m "Update daily brief"
          git push
