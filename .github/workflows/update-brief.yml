name: Update Daily Brief

on:
  schedule:
    - cron: '30 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      -       - name: Generate brief.json
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          node <<'EOF'
          const fs = require('fs');

          async function main() {
            const date = new Date().toISOString().slice(0, 10);

            const prompt = `
You are preparing a daily pastoral dashboard for Kris Krausse, a lead pastor in British Columbia, Canada.

Return ONLY valid JSON with this exact shape:
{
  "date": "YYYY-MM-DD",
  "global": [{ "title": "", "summary": "", "url": "" }],
  "canadian": [{ "title": "", "summary": "", "url": "" }],
  "local": [{ "title": "", "summary": "", "url": "" }],
  "persecutedChurch": [{ "title": "", "summary": "", "url": "" }],
  "leadership": { "title": "", "summary": "", "url": "" },
  "goodNews": { "title": "", "summary": "", "url": "" }
}

Requirements:
- 3 global stories
- 3 Canadian stories
- 3 local stories relevant to Fraser Valley / Abbotsford / Chilliwack / lower mainland if possible
- 2 persecuted church stories
- 1 leadership article shaped by the principles of Sustainable Leadership by Gayel Avery
- 1 genuinely encouraging good news story
- summaries should be 1 to 2 sentences, clear and pastoral
- include real-looking urls
- date must be today's date
- no markdown
- no commentary outside JSON
`;

            const response = await fetch('https://api.openai.com/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`
              },
              body: JSON.stringify({
                model: 'gpt-4.1-mini',
                temperature: 0.7,
                messages: [
                  { role: 'system', content: 'You produce clean structured JSON only.' },
                  { role: 'user', content: prompt }
                ]
              })
            });

            if (!response.ok) {
              const text = await response.text();
              throw new Error(`OpenAI API error: ${response.status} ${text}`);
            }

            const data = await response.json();
            const content = data.choices?.[0]?.message?.content;

            if (!content) {
              throw new Error('No content returned from OpenAI');
            }

            let brief;
            try {
              brief = JSON.parse(content);
            } catch (err) {
              throw new Error('Model did not return valid JSON: ' + content);
            }

            brief.date = date;
            fs.writeFileSync('brief.json', JSON.stringify(brief, null, 2));
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF


      - name: Commit updated brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add brief.json
          git diff --cached --quiet || git commit -m "Update daily brief"
          git push
